<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Messenger Mini</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#e5ddd5;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  background:#0084ff;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:15px;
  word-wrap:break-word;
  position:relative;
}

/* LEFT */
.left{
  background:white;
  align-self:flex-start;
}

/* RIGHT */
.right{
  background:#0084ff;
  color:white;
  align-self:flex-end;
}

/* NAME */
.name{
  font-size:11px;
  opacity:0.7;
}

/* TIME */
.time{
  font-size:10px;
  opacity:0.6;
  text-align:right;
}

/* INPUT */
#inputArea{
  display:flex;
  padding:10px;
  background:#f0f0f0;
}

#text{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  margin-left:8px;
  padding:10px;
  border:none;
  background:#0084ff;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>💬 Chat chung</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="text" placeholder="Nhập tin..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyzpqA4D40zfukz5KGRY_eGxipH1E4seSek0-GeYdEdA0NReXpRWWjcafvbo074LEnR/exec";

// LẤY TÊN (lưu local)
let username = localStorage.getItem("chat_name");
if(!username){
  username = prompt("Nhập tên của bạn:");
  localStorage.setItem("chat_name", username);
}

let lastData = "";

// LOAD CHAT
async function load(){
  const res = await fetch(API + "?t=" + Date.now());
  const data = await res.json();

  const json = JSON.stringify(data);
  if(json === lastData) return;
  lastData = json;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(item=>{
    const isMe = item.message.startsWith(username + ":");

    const div = document.createElement("div");
    div.className = "msg " + (isMe ? "right" : "left");

    let text = item.message;
    let name = "";

    if(item.message.includes(":")){
      const parts = item.message.split(":");
      name = parts[0];
      text = parts.slice(1).join(":");
    }

    div.innerHTML = `
      ${!isMe ? `<div class="name">${name}</div>` : ""}
      ${escapeHtml(text)}
      <div class="time">${item.time}</div>
    `;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// GỬI
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  const full = username + ":" + text;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message:full})
  });

  input.value="";
  load();
}

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

// AUTO LOAD
setInterval(load,2000);
load();
</script>

</body>
</html>
