<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Note Full</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ece5dd;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#075E54;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* mỗi tin nhắn */
.msg{
  background:white;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  word-wrap:break-word;
  white-space:pre-wrap; /* giữ xuống dòng */
}

.time{
  font-size:11px;
  color:#666;
  text-align:right;
  margin-top:5px;
}

/* input */
#inputArea{
  display:flex;
  padding:10px;
  background:#f0f0f0;
}

#text{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

button{
  margin-left:8px;
  padding:10px 15px;
  border:none;
  background:#075E54;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>💬 Ghi chú (hiển thị toàn bộ)</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="text" placeholder="Nhập nội dung..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyzpqA4D40zfukz5KGRY_eGxipH1E4seSek0-GeYdEdA0NReXpRWWjcafvbo074LEnR/exec";

let lastData = "";

// LOAD toàn bộ dữ liệu
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now()); // chống cache
    const data = await res.json();

    const json = JSON.stringify(data);
    if(json === lastData) return; // không load lại nếu không đổi
    lastData = json;

    const chat = document.getElementById("chat");

    chat.innerHTML = data.map(item => `
      <div class="msg">
        ${escapeHtml(item.message)}
        <div class="time">${item.time}</div>
      </div>
    `).join("");

    chat.scrollTop = chat.scrollHeight;

  }catch(e){
    console.log("Lỗi load:", e);
  }
}

// GỬI tin (không thêm tên, không chỉnh sửa)
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message:text})
  });

  input.value="";
  load();
}

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

// auto load
setInterval(load,2000);
load();
</script>

</body>
</html>
