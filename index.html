<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mini</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:70%;
padding:10px;
margin:5px;
border-radius:12px;
word-wrap:break-word;
}

.left{
background:white;
align-self:flex-start;
}

.right{
background:#0084ff;
color:white;
align-self:flex-end;
}

.time{
font-size:10px;
opacity:0.6;
text-align:right;
margin-top:4px;
}

img{
max-width:100%;
border-radius:8px;
margin-top:5px;
cursor:pointer;
}

#bottom{
display:flex;
padding:8px;
background:white;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
}

#file{display:none;}

button{
margin-left:5px;
padding:0 15px;
border:none;
background:#0084ff;
color:white;
border-radius:20px;
font-size:15px;
}

a{
color:#0b93f6;
word-break:break-all;
}

.right a{
color:white;
text-decoration:underline;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file" accept="image/*">
<button onclick="document.getElementById('file').click()">📷</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwPmohhkVnKHnQya2n-x0A2b1KqNybhYgxKiFp9Q_esXuLRoID-kT2_c07AN5NjDQDt/exec";

let username=localStorage.getItem("name");

if(!username){
username=prompt("Tên của bạn:");
localStorage.setItem("name",username);
}

let lastData="";

// 🔐 chống lỗi HTML
function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

// 🔗 link click được
function makeLink(text){

let safe=escapeHtml(text);

return safe.replace(/((https?:\/\/)?[^\s]+\.[^\s]+)/g,function(url){

let href=url.startsWith("http")?url:"https://"+url;

return '<a href="'+href+'" target="_blank">'+url+'</a>';

});

}

// 🕒 giờ
function formatTime(t){
if(!t) return "--:--";
if(typeof t==="string" && t.length>=5) return t.substring(0,5);
return "--:--";
}

// 📜 kiểm tra có đang ở cuối không
function isAtBottom(el){
return el.scrollHeight - el.scrollTop - el.clientHeight < 50;
}

async function load(){

let top=document.getElementById("top");

// giữ vị trí scroll
let stayBottom=isAtBottom(top);

let res=await fetch(API+"?t="+Date.now());
let data=await res.json();

let json=JSON.stringify(data);
if(json===lastData) return;
lastData=json;

top.innerHTML="";

data.forEach(row=>{

let msg=row.message||"";

let name="";
let text=msg;

let i=msg.indexOf(":");

if(i!=-1){
name=msg.substring(0,i);
text=msg.substring(i+1);
}

let me=name==username;

let div=document.createElement("div");
div.className="msg "+(me?"right":"left");

let content="";

// 📷 ảnh
if(text.startsWith("data:image")){
content='<img src="'+text+'">';
}else{
content=makeLink(text);
}

div.innerHTML=
(me?"":"<b>"+escapeHtml(name)+"</b><br>")
+content+
'<div class="time">'+formatTime(row.time)+'</div>';

top.appendChild(div);

});

// chỉ scroll khi đang ở cuối
if(stayBottom){
top.scrollTop=top.scrollHeight;
}

}

// gửi text
async function send(){

let input=document.getElementById("text");
let text=input.value.trim();
if(!text) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message:username+":"+text
})
});

input.value="";
load();
}

// 📷 gửi ảnh
document.getElementById("file").addEventListener("change",function(){

let file=this.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=async function(){

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message:username+":"+reader.result
})
});

load();
};

reader.readAsDataURL(file);

});

// enter gửi
document.getElementById("text").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

setInterval(load,1000);
load();

</script>

</body>
</html>
