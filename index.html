<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat Mobile</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#f0f2f5;
}

/* KHUNG CHAT */
#top{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* TIN NHẮN */
.msg{
  background:white;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  font-size:15px;
  line-height:1.4;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.time{
  font-size:11px;
  color:#666;
  text-align:right;
  margin-top:5px;
}

/* KHUNG NHẬP */
#bottom{
  display:flex;
  padding:8px;
  background:#fff;
  border-top:1px solid #ddd;
  position:sticky;
  bottom:0;
}

/* INPUT */
#text{
  flex:1;
  padding:12px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
}

/* NÚT */
button{
  margin-left:8px;
  padding:0 16px;
  border:none;
  background:#0084ff;
  color:white;
  border-radius:25px;
  font-size:15px;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
  <input id="text" placeholder="Nhập tin..." autocomplete="off">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyzpqA4D40zfukz5KGRY_eGxipH1E4seSek0-GeYdEdA0NReXpRWWjcafvbo074LEnR/exec";

let lastData = "";

// LOAD
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(!Array.isArray(data)) return;

    const json = JSON.stringify(data);
    if(json === lastData) return;
    lastData = json;

    const top = document.getElementById("top");

    top.innerHTML = data.map(item => `
      <div class="msg">
        ${escapeHtml(item.message || "")}
        <div class="time">${item.time || ""}</div>
      </div>
    `).join("");

    top.scrollTop = top.scrollHeight;

  }catch(e){
    console.log(e);
  }
}

// GỬI
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message:text})
  });

  input.value="";
  load();
}

// ENTER gửi
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

// auto load
setInterval(load,2000);
load();
</script>

</body>
</html>
