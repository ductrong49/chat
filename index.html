<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Zalo Style</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#0084ff;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* tin nhắn */
.msg{
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
  word-wrap:break-word;
}

/* trái */
.left{
  background:white;
  align-self:flex-start;
}

/* phải */
.right{
  background:#0084ff;
  color:white;
  align-self:flex-end;
}

.time{
  font-size:10px;
  opacity:0.6;
  text-align:right;
  margin-top:3px;
}

#inputArea{
  display:flex;
  padding:10px;
  background:#fff;
  border-top:1px solid #ddd;
}

#text{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  margin-left:8px;
  padding:10px;
  border:none;
  background:#0084ff;
  color:white;
  border-radius:20px;
}
</style>
</head>

<body>

<header>💬 Chat hôm nay</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="text" placeholder="Nhập tin..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyzpqA4D40zfukz5KGRY_eGxipH1E4seSek0-GeYdEdA0NReXpRWWjcafvbo074LEnR/exec";

let lastData = "";

// load dữ liệu
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    const json = JSON.stringify(data);
    if(json === lastData) return;
    lastData = json;

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach((item, index)=>{
      const div = document.createElement("div");

      // xen trái phải cho giống chat
      div.className = "msg " + (index % 2 === 0 ? "left" : "right");

      div.innerHTML = `
        ${escapeHtml(item.message)}
        <div class="time">${item.time}</div>
      `;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;

  }catch(e){
    console.log(e);
  }
}

// gửi tin
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message:text})
  });

  input.value="";
  load();
}

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

setInterval(load,2000);
load();
</script>

</body>
</html>
