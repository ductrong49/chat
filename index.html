<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Note Online</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ece5dd;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#075E54;
  color:white;
  padding:12px;
  text-align:center;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  background:#dcf8c6;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  max-width:75%;
  word-wrap:break-word;
}

.time{
  font-size:10px;
  color:#555;
  text-align:right;
}

#inputArea{
  display:flex;
  padding:10px;
  background:#f0f0f0;
}

#text{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

button{
  margin-left:8px;
  padding:10px 15px;
  border:none;
  background:#075E54;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>💬 Chat ghi chú hôm nay</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="text" placeholder="Nhập tin..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyzpqA4D40zfukz5KGRY_eGxipH1E4seSek0-GeYdEdA0NReXpRWWjcafvbo074LEnR/exec";

let lastData = "";

// LOAD CHAT (fix thiếu tin nhắn)
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now()); // chống cache
    const data = await res.json();

    const jsonString = JSON.stringify(data);

    // Nếu dữ liệu không đổi → không render lại
    if(jsonString === lastData) return;
    lastData = jsonString;

    const chat = document.getElementById("chat");

    // render toàn bộ
    chat.innerHTML = data.map(item => `
      <div class="msg">
        ${escapeHtml(item.message)}
        <div class="time">${item.time}</div>
      </div>
    `).join("");

    // luôn scroll xuống cuối
    setTimeout(()=>{
      chat.scrollTop = chat.scrollHeight;
    },50);

  }catch(e){
    console.log("Lỗi load:", e);
  }
}

// GỬI TIN
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();

  if(!text) return;

  try{
    await fetch(API,{
      method:"POST",
      body:new URLSearchParams({message:text})
    });

    input.value="";
    load();

  }catch(e){
    alert("Lỗi gửi!");
  }
}

// CHỐNG lỗi HTML phá layout
function escapeHtml(text){
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// auto load
setInterval(load, 2000);
load();
</script>

</body>
</html>
