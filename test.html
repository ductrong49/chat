<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mini</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Arial;background:linear-gradient(to bottom,#e5ddd5,#d9e6f2);display:flex;flex-direction:column;height:100vh;}
#top{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;}
.msg{max-width:75%;padding:10px 14px;margin:6px 0;border-radius:18px;word-wrap:break-word;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.left{background:white;align-self:flex-start;border-bottom-left-radius:5px;}
.right{background:linear-gradient(135deg,#0084ff,#00c6ff);color:white;align-self:flex-end;border-bottom-right-radius:5px;}
.msg b{font-size:12px;opacity:0.7;}
.time{font-size:10px;opacity:0.6;text-align:right;margin-top:4px;}
img{max-width:100%;border-radius:10px;margin-top:6px;}
.fileBox{margin-top:6px;padding:8px;background:#f1f1f1;border-radius:8px;font-size:14px;}
.fileBox a{color:#007bff;text-decoration:none;}
.right .fileBox{background:rgba(255,255,255,0.2);}
#bottom{display:flex;padding:10px;background:rgba(255,255,255,0.9);border-top:1px solid #ddd;}
#text{flex:1;padding:12px;border-radius:25px;border:1px solid #ccc;font-size:16px;}
button{margin-left:6px;padding:0 14px;border:none;background:#0084ff;color:white;border-radius:25px;}
#file,#file2{display:none;}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file" accept="image/*">
<button onclick="file.click()">📷</button>
<input type="file" id="file2">
<button onclick="file2.click()">📎</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxlSuV1kSbLTESDKP-63z4HZRpYaXCHGTDGq03HUYeHTnaDzu-C8QB-xl2PrlA-K2UD/exec";

let username=localStorage.getItem("name") || prompt("Tên bạn:");
localStorage.setItem("name",username);

// LOAD
async function load(){
let res=await fetch(API+"?t="+Date.now());
let data=await res.json();

if(!Array.isArray(data)) data=Object.values(data);

let top=document.getElementById("top");
top.innerHTML="";

data.forEach(row=>{

let msg=row.message||"";
let name="", text=msg;

let i=msg.indexOf(":");
if(i!=-1){ name=msg.substring(0,i); text=msg.substring(i+1); }

let me=name==username;
let div=document.createElement("div");
div.className="msg "+(me?"right":"left");

let content="";

if(text.startsWith("FILE|")){
let p=text.split("|");
let filename=p[1];
let url=p[2];

if(url.includes("googleusercontent")){
content='<img src="'+url+'">';
}else{
content=`📎 ${filename}<br><a href="${url}" target="_blank">Tải xuống</a>`;
}

}else{
content=text;
}

div.innerHTML=(me?"":"<b>"+name+"</b><br>")+content+
'<div class="time">'+row.time+'</div>';

top.appendChild(div);
});

top.scrollTop=top.scrollHeight;
}

// SEND TEXT
async function send(){
if(!text.value.trim()) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:username,
text:text.value
})
});

text.value="";
load();
}

// UPLOAD FILE (KHÔNG BASE64)
async function upload(file){

let reader=new FileReader();

reader.onload=async function(){
let base64=reader.result.split(",")[1];

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:username,
filename:file.name,
type:file.type,
file:base64
})
});

load();
};

reader.readAsDataURL(file);
}

file.onchange=()=>file.files[0]&&upload(file.files[0]);
file2.onchange=()=>file2.files[0]&&upload(file2.files[0]);

text.onkeypress=e=>{if(e.key==="Enter")send();};

setInterval(load,1500);
load();

</script>

</body>
</html>
