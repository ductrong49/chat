<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mini</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:linear-gradient(to bottom,#e5ddd5,#d9e6f2);
display:flex;
flex-direction:column;
height:100vh;
}
#top{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
}
.msg{
max-width:75%;
padding:10px 14px;
margin:6px 0;
border-radius:18px;
word-wrap:break-word;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.left{
background:white;
align-self:flex-start;
border-bottom-left-radius:5px;
}
.right{
background:linear-gradient(135deg,#0084ff,#00c6ff);
color:white;
align-self:flex-end;
border-bottom-right-radius:5px;
}
.msg b{font-size:12px;opacity:0.7;}
.time{font-size:10px;opacity:0.6;text-align:right;margin-top:4px;}
img{max-width:100%;border-radius:10px;margin-top:6px;}
.fileBox{
margin-top:6px;
padding:8px;
background:#f1f1f1;
border-radius:8px;
font-size:14px;
}
.fileBox a{color:#007bff;text-decoration:none;}
.right .fileBox{background:rgba(255,255,255,0.2);}
#bottom{
display:flex;
padding:10px;
background:rgba(255,255,255,0.9);
border-top:1px solid #ddd;
}
#text{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}
button{
margin-left:6px;
padding:0 14px;
border:none;
background:#0084ff;
color:white;
border-radius:25px;
cursor:pointer;
}
#file,#file2{display:none;}
a{color:#0b93f6;word-break:break-all;}
.right a{color:#fff;text-decoration:underline;}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">

<input type="file" id="file" accept="image/*">
<button onclick="file.click()">📷</button>

<input type="file" id="file2">
<button onclick="file2.click()">📎</button>

<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw3uALZbnsRX8T8bGh3fQdU7GFZh_2mDM-1PGkvDh3l1EU0aBnt23hniFGwewo6UypT/exec";

let username=localStorage.getItem("name");
if(!username){
username=prompt("Tên của bạn:");
localStorage.setItem("name",username);
}

let lastData="";

// escape HTML
function escapeHtml(t){
return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// link
function makeLink(t){
let s=escapeHtml(t);
return s.replace(/((https?:\/\/)?[^\s]+\.[^\s]+)/g,function(url){
let href=url.startsWith("http")?url:"https://"+url;
return '<a href="'+href+'" target="_blank">'+url+'</a>';
});
}

// nhận diện ảnh
function isImage(url){
return url.match(/\.(jpg|jpeg|png|gif|webp)$/i);
}

// LOAD DATA
async function load(){
try{
let res=await fetch(API+"?t="+Date.now());
let data=await res.json();

console.log("DATA:",data);

// 🔥 fix nếu server trả object
if(!Array.isArray(data)){
data=Object.values(data);
}

let json=JSON.stringify(data);
if(json===lastData) return;
lastData=json;

let top=document.getElementById("top");
let stayBottom = top.scrollHeight - top.scrollTop - top.clientHeight < 50;

top.innerHTML="";

data.forEach(row=>{

let msg=row.message||"";

let name="";
let text=msg;

let i=msg.indexOf(":");
if(i!=-1){
name=msg.substring(0,i);
text=msg.substring(i+1);
}

let me=name==username;

let div=document.createElement("div");
div.className="msg "+(me?"right":"left");

let content="";

// FILE
if(text.startsWith("FILE|")){
let parts=text.split("|");
let filename=parts[1];
let url=parts[2];

if(isImage(url)){
content=`<img src="${url}">`;
}else{
content=`
<div class="fileBox">
📎 ${escapeHtml(filename)}<br>
<a href="${url}" target="_blank">Tải về</a>
</div>`;
}

}else{
content=makeLink(text);
}

div.innerHTML=
(me?"":"<b>"+escapeHtml(name)+"</b><br>")
+content+
'<div class="time">'+(row.time||"--")+'</div>';

top.appendChild(div);

});

if(stayBottom){
top.scrollTop=top.scrollHeight;
}

}catch(err){
console.error("LOAD ERROR:",err);
}
}

// ===== GỬI TEXT =====
async function send(){
let input=document.getElementById("text");
let text=input.value.trim();
if(!text) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message:username+":"+text
})
});

input.value="";
load();
}

// ===== BASE64 =====
function toBase64(file){
return new Promise((resolve,reject)=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
reader.onerror=error=>reject(error);
});
}

// ===== UPLOAD FILE =====
async function upload(file){

if(file.size > 15 * 1024 * 1024){
alert("File quá lớn (>15MB)");
return;
}

let base64 = await toBase64(file);

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message: username + ":BASE64|" + file.name + "|" + file.type + "|" + base64.split(",")[1]
})
});

load();
}

// ảnh
file.addEventListener("change",function(){
let f=this.files[0];
if(f) upload(f);
});

// file
file2.addEventListener("change",function(){
let f=this.files[0];
if(f) upload(f);
});

// enter
text.addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});

// auto load
setInterval(load,1500);
load();

</script>

</body>
</html>
