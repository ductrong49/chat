<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Drive</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
background:#e5ddd5;
}

#top{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:70%;
padding:10px;
margin:5px;
border-radius:10px;
}

.left{background:#fff;align-self:flex-start;}
.right{background:#0084ff;color:#fff;align-self:flex-end;}

img{max-width:100%;border-radius:8px;}

.file{
background:#eee;
padding:5px;
border-radius:5px;
margin-top:5px;
}

#bottom{
display:flex;
padding:10px;
background:#fff;
}

#text{
flex:1;
padding:10px;
}

button{margin-left:5px;}
#file{display:none;}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file">
<button onclick="file.click()">📎</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzg-a8lU1QdGoRRzfKPGRJmvk2jvAnErTknJsu-rf7Wu1qa3Zt5dt0X6OGFZku905mD/exec";

let name = localStorage.getItem("name");
if(!name){
name = prompt("Tên:");
localStorage.setItem("name",name);
}

// ===== LOAD =====
async function load(){
let res = await fetch(API);
let data = await res.json();

let top = document.getElementById("top");
top.innerHTML = "";

data.forEach(r=>{
let div = document.createElement("div");
div.className = "msg " + (r.name===name?"right":"left");

let content = "";

// FILE
if(r.message.startsWith("FILE|")){
let p = r.message.split("|");

if(p[2].includes("uc?export=view")){
content = `<img src="${p[2]}">`;
}else{
content = `<div class="file">
📎 ${p[1]}<br>
<a href="${p[2]}" target="_blank">Tải</a>
</div>`;
}

}else{
content = r.message;
}

div.innerHTML = (r.name===name?"":"<b>"+r.name+"</b><br>") + content;

top.appendChild(div);
});

top.scrollTop = top.scrollHeight;
}

// ===== SEND TEXT =====
async function send(){
let text = document.getElementById("text").value;
if(!text) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
message:text
})
});

document.getElementById("text").value="";
load();
}

// ===== UPLOAD FILE =====
file.onchange = async ()=>{
let f = file.files[0];

let reader = new FileReader();
reader.onload = async ()=>{
let base64 = reader.result.split(",")[1];

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
filename:f.name,
type:f.type,
file:base64
})
});

load();
};

reader.readAsDataURL(f);
};

setInterval(load,2000);
load();

</script>

</body>
</html>
