<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mini</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}
#top{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
}
.msg{
max-width:75%;
padding:10px;
margin:6px 0;
border-radius:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.left{background:#fff;align-self:flex-start;}
.right{background:#0084ff;color:#fff;align-self:flex-end;}
.time{font-size:10px;opacity:0.6;text-align:right;}
img{max-width:70%;border-radius:10px;margin-top:6px;}
.fileBox{background:#eee;padding:6px;border-radius:6px;margin-top:6px;}
#bottom{display:flex;padding:10px;background:#fff;}
#text{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;}
button{margin-left:5px;padding:0 12px;border:none;background:#0084ff;color:#fff;border-radius:20px;}
#file,#file2{display:none;}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file" accept="image/*">
<button onclick="file.click()">📷</button>
<input type="file" id="file2">
<button onclick="file2.click()">📎</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMXBUdObI4OINTm20h9wbTELPIfD9xMmpBH3Fhb3mdn8mQXlcafbVb9oX8WR9DRISNxA7LDrjdpIVo9yP6JtVlYVq9U7tKmTNBCD4NyV9X6jHF6MMLxuY8-ME4DjPCC9Ij2MjW6endyYcHCvmGzNqsOaaQrwmT80pceXBtOGvS17SPz2Mimoip8FNmOXB8KV0dNar_pOzLtvfVOIuWZaImohmqJvICjvF1rKsebjsDjhTPQPuBLn2vv08aWlu5PJBiPHJ041GvRoD-oTp-Bbk5NK0erP4A&lib=MG_09ckd-CbzC-16MUE28MvUJQey_UtJ9";

let username=localStorage.getItem("name");
if(!username){
username=prompt("Tên:");
localStorage.setItem("name",username);
}

let last="";

// gửi dữ liệu chuẩn
async function postData(msg){

let form=new FormData();
form.append("message",msg);

await fetch(API,{
method:"POST",
body:form
});

}

// load
async function load(){

let res=await fetch(API+"?t="+Date.now());
let data=await res.json();

let json=JSON.stringify(data);
if(json===last) return;
last=json;

top.innerHTML="";

data.forEach(row=>{

let msg=row.message||"";
let name="";
let text=msg;

let i=msg.indexOf(":");
if(i!=-1){
name=msg.substring(0,i);
text=msg.substring(i+1);
}

let me=name==username;

let div=document.createElement("div");
div.className="msg "+(me?"right":"left");

let content="";

// FILE
if(text.startsWith("FILE|")){
let p=text.split("|");
let file=p[1];
let url=p[2];

if(file.match(/\.(jpg|png|jpeg|gif)/i)){
content='<img src="'+url+'">';
}else{
content='<div class="fileBox">📎 '+file+'<br><a href="'+url+'" target="_blank">Mở</a></div>';
}

}else{
content=text;
}

div.innerHTML=
(me?"":"<b>"+name+"</b><br>")+
content+
'<div class="time">'+(row.time||"--:--")+'</div>';

top.appendChild(div);

});

top.scrollTop=top.scrollHeight;

}

// gửi text
async function send(){

let t=text.value.trim();
if(!t) return;

await postData(username+":"+t);

text.value="";
load();
}

// gửi file (chuẩn)
function sendFile(file){

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

postData(
username+":BASE64|"+file.name+"|"+file.type+"|"+base64
);

};

reader.readAsDataURL(file);
}

// ảnh
file.onchange=function(){
if(this.files[0]) sendFile(this.files[0]);
this.value="";
}

// file
file2.onchange=function(){
if(this.files[0]) sendFile(this.files[0]);
this.value="";
}

// enter
text.onkeypress=function(e){
if(e.key==="Enter") send();
}

setInterval(load,1000);
load();

</script>

</body>
</html>
