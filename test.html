<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Drive Pro</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
background:#e5ddd5;
}

#top{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px;
margin:5px;
border-radius:15px;
word-wrap:break-word;
}

.left{background:#fff;align-self:flex-start;}
.right{background:#0084ff;color:#fff;align-self:flex-end;}

img{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.file{
background:#eee;
padding:6px;
border-radius:6px;
margin-top:5px;
}

.right .file{background:rgba(255,255,255,0.2);}

#bottom{
display:flex;
padding:10px;
background:#fff;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
margin-left:5px;
padding:6px 10px;
border:none;
background:#0084ff;
color:#fff;
border-radius:10px;
cursor:pointer;
}

#file{display:none;}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">

<input type="file" id="file">
<button onclick="file.click()">📎</button>

<button onclick="send()">Gửi</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyZ75iqW8BeunY3hVVXAs9oaEouHOESj-4JYXMJgEOpy4olTTBFcQXrvWFmCcNGUfzf/exec";

let name = localStorage.getItem("name");
if(!name){
name = prompt("Tên của bạn:");
localStorage.setItem("name",name);
}

// ===== LOAD =====
async function load(){
let res = await fetch(API+"?t="+Date.now());
let data = await res.json();

let top = document.getElementById("top");
top.innerHTML = "";

data.forEach(r=>{
let div = document.createElement("div");
div.className = "msg " + (r.name===name?"right":"left");

let content = "";

// FILE
if(r.message.startsWith("FILE|")){
let p = r.message.split("|");
let filename = p[1];
let view = p[2];
let download = p[3];

// ảnh
if(view.includes("uc?export=view")){
content = `<img src="${view}">`;
}else{
content = `
<div class="file">
📎 ${filename}<br>
<a href="${download}" target="_blank">Tải xuống</a>
</div>`;
}

}

// LINK
else if(r.message.startsWith("http")){
content = `<a href="${r.message}" target="_blank">${r.message}</a>`;
}

// TEXT
else{
content = r.message;
}

div.innerHTML =
(r.name===name?"":"<b>"+r.name+"</b><br>") +
content +
`<div style="font-size:10px;opacity:0.6;text-align:right;">${r.time}</div>`;

top.appendChild(div);
});

top.scrollTop = top.scrollHeight;
}

// ===== SEND TEXT =====
async function send(){
let text = document.getElementById("text").value.trim();
if(!text) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
message:text
})
});

document.getElementById("text").value="";
load();
}

// ===== UPLOAD =====
file.onchange = async ()=>{
let f = file.files[0];
if(!f) return;

let reader = new FileReader();

reader.onload = async ()=>{
let base64 = reader.result.split(",")[1];

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
filename:f.name,
type:f.type,
file:base64
})
});

load();
};

reader.readAsDataURL(f);
};

// ENTER gửi
document.getElementById("text").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

setInterval(load,2000);
load();

</script>

</body>
</html>
