<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
background:#e5ddd5;
}

#top{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px 14px;
margin:6px;
border-radius:18px;
word-wrap:break-word;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.left{background:#fff;align-self:flex-start;}
.right{background:#0084ff;color:#fff;align-self:flex-end;}

img{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.file{
margin-top:5px;
padding:8px;
border-radius:8px;
background:#eee;
}

.right .file{
background:rgba(255,255,255,0.2);
}

#bottom{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #ccc;
}

#text{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
font-size:15px;
}

button{
margin-left:5px;
border:none;
background:#0084ff;
color:#fff;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

button:hover{opacity:0.85;}

#file{display:none;}

.time{
font-size:10px;
opacity:0.6;
text-align:right;
margin-top:4px;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file">
<button id="btnFile">📎</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyVIMbeOf7-cWFi9yfqr2k-W0GqCDl8tg6sFQj6AXPdL0dNK7utnsDo_BpuGK_N86xV/exec";

const fileInput = document.getElementById("file");
const btnFile = document.getElementById("btnFile");
const topDiv = document.getElementById("top");

btnFile.onclick = ()=> fileInput.click();

// ===== USER =====
let name = localStorage.getItem("name");
if(!name){
name = prompt("Tên của bạn:");
localStorage.setItem("name",name);
}

// ===== LOAD =====
async function load(){
try{
let res = await fetch(API+"?t="+Date.now());
let data = await res.json();

topDiv.innerHTML = "";

data.forEach(r=>{
let div = document.createElement("div");
div.className = "msg " + (r.name===name?"right":"left");

let content = "";

// FILE
if(r.message && r.message.startsWith("FILE|")){
let p = r.message.split("|");
let filename = p[1];
let view = p[2];
let download = p[3];

// ảnh
if(view.includes("uc?export=view")){
content = `<img src="${view}">`;
}else{
content = `
<div class="file">
📎 ${filename}<br>
<a href="${download}" target="_blank">Tải xuống</a>
</div>`;
}

}

// LINK
else if(r.message && r.message.startsWith("http")){
content = `<a href="${r.message}" target="_blank">${r.message}</a>`;
}

// TEXT
else{
content = r.message || "";
}

div.innerHTML =
(r.name===name?"":"<b>"+r.name+"</b><br>") +
content +
`<div class="time">${r.time || ""}</div>`;

topDiv.appendChild(div);
});

topDiv.scrollTop = topDiv.scrollHeight;

}catch(e){
console.log("Lỗi load:",e);
}
}

// ===== SEND =====
async function send(){
let text = document.getElementById("text").value.trim();
if(!text) return;

try{
await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:new URLSearchParams({
name:name,
message:text
})
});

document.getElementById("text").value="";
load();

}catch(e){
alert("Lỗi gửi tin");
}
}

// ===== UPLOAD =====
fileInput.onchange = async ()=>{
let f = fileInput.files[0];
if(!f) return;

let reader = new FileReader();

reader.onload = async ()=>{
let base64 = reader.result.split(",")[1];

try{
await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:new URLSearchParams({
name:name,
filename:f.name,
type:f.type,
file:base64
})
});

load();

}catch(e){
alert("Upload lỗi");
}
};

reader.readAsDataURL(f);
};

// ENTER gửi
document.getElementById("text").addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

// AUTO LOAD
setInterval(load,2000);
load();

</script>

</body>
</html>
