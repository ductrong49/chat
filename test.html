<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Zalo Mini</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#e5ddd5;
}

#top{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:15px;
  word-wrap:break-word;
}

.left{background:white; align-self:flex-start;}
.right{background:#0084ff; color:white; align-self:flex-end;}

.name{font-size:11px; opacity:0.7;}
.time{font-size:10px; opacity:0.6; text-align:right;}

img{
  max-width:100%;
  border-radius:10px;
  margin-top:5px;
}

#bottom{
  display:flex;
  padding:8px;
  background:#fff;
  border-top:1px solid #ddd;
}

#text{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

#file{display:none;}

button{
  margin-left:5px;
  padding:0 12px;
  border:none;
  background:#0084ff;
  color:white;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
  <input id="text" placeholder="Nhập tin...">
  <input type="file" id="file" accept="image/*">
  <button onclick="document.getElementById('file').click()">📷</button>
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "DÁN_LINK_API_MỚI_CỦA_BẠN";

let username = localStorage.getItem("chat_name");
if(!username){
  username = prompt("Nhập tên:");
  localStorage.setItem("chat_name", username);
}

let lastData = "";

// escape
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

// link clickable
function makeLink(text){
  return text.replace(/(https?:\/\/[^\s]+)/g, function(url){
    return '<a href="'+url+'" target="_blank" style="color:#0b93f6;">'+url+'</a>';
  });
}

// format giờ chuẩn
function formatTime(t){
  if(!t) return "";

  if(typeof t === "string" && /^\d{2}:\d{2}:\d{2}$/.test(t)){
    return t.slice(0,5);
  }

  return "";
}

// LOAD
async function load(){
  const res = await fetch(API + "?t=" + Date.now());
  const data = await res.json();

  if(!Array.isArray(data)) return;

  const json = JSON.stringify(data);
  if(json === lastData) return;
  lastData = json;

  const top = document.getElementById("top");
  top.innerHTML = "";

  data.forEach(item=>{
    let name = "";
    let text = item.message || "";

    const i = text.indexOf(":");
    if(i !== -1){
      name = text.substring(0,i);
      text = text.substring(i+1);
    }

    const isMe = name === username;

    const div = document.createElement("div");
    div.className = "msg " + (isMe ? "right" : "left");

    let content = "";

    // ảnh
    if(text.startsWith("data:image")){
      content = `<img src="${text}">`;
    }else{
      let safe = escapeHtml(text);
      safe = makeLink(safe);
      content = safe;
    }

    div.innerHTML = `
      ${!isMe ? `<div class="name">${name}</div>` : ""}
      ${content}
      <div class="time">${formatTime(item.time)}</div>
    `;

    top.appendChild(div);
  });

  top.scrollTop = top.scrollHeight;
}

// gửi text
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message: username + ":" + text})
  });

  input.value="";
  load();
}

// gửi ảnh
document.getElementById("file").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = async function(){
    await fetch(API,{
      method:"POST",
      body:new URLSearchParams({
        message: username + ":" + reader.result
      })
    });
    load();
  };

  reader.readAsDataURL(file);
});

// enter gửi
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

setInterval(load,2000);
load();
</script>

</body>
</html>
