<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Web</title>

<style>
body{margin:0;font-family:Arial;background:#e5ddd5;}
#chat{height:90vh;overflow:auto;padding:10px;}
.msg{margin:5px 0;padding:10px;border-radius:10px;max-width:70%;}
.me{background:#0084ff;color:white;margin-left:auto;}
.other{background:white;}
img{max-width:100%;border-radius:8px;}
#input{display:flex;padding:10px;background:white;}
#text{flex:1;padding:10px;}
button{margin-left:5px;}
</style>
</head>

<body>

<div id="chat"></div>

<div id="input">
<input id="text" placeholder="Nhập tin...">
<input type="file" id="file" style="display:none">
<button onclick="file.click()">📎</button>
<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyah-pBiiV65vbEc3LpfHmb0hho0ME_epVKoN9EEk0CuiORWEevgb5V_gPtHyw7sbkV/exec";

let name=localStorage.getItem("name")||prompt("Tên:");
localStorage.setItem("name",name);

// LOAD
async function load(){
let res=await fetch(API);
let data=await res.json();

let chat=document.getElementById("chat");
chat.innerHTML="";

data.forEach(m=>{
let div=document.createElement("div");
div.className="msg "+(m.name==name?"me":"other");

let content="";

if(m.message.startsWith("FILE|")){
let p=m.message.split("|");
let filename=p[1];
let url=p[2];

if(url.match(/\.(jpg|png|jpeg|gif)/)){
content=`<img src="${url}">`;
}else{
content=`📎 ${filename} <a href="${url}" target="_blank">Tải</a>`;
}

}else{
content=m.message;
}

div.innerHTML=`<b>${m.name}</b><br>${content}<br><small>${m.time}</small>`;
chat.appendChild(div);
});

chat.scrollTop=chat.scrollHeight;
}

// SEND TEXT
async function send(){
if(!text.value) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
message:text.value
})
});

text.value="";
load();
}

// FILE
file.onchange=()=>{
let f=file.files[0];
let r=new FileReader();

r.onload=async ()=>{
await fetch(API,{
method:"POST",
body:new URLSearchParams({
name:name,
message:"BASE64|"+f.name+"|"+f.type+"|"+r.result.split(",")[1]
})
});
load();
};

r.readAsDataURL(f);
};

setInterval(load,2000);
load();

</script>

</body>
</html>
