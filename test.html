<script>
const API = "https://script.google.com/macros/s/AKfycbx9rTPj_GAlzseem_f8SAUwzVqOOBPAdMPfc1-W4CalSY0jHIAicoLvlzICB2yEBcDY/exec";

let username = localStorage.getItem("chat_name");
if(!username){
  username = prompt("Nhập tên:");
  localStorage.setItem("chat_name", username);
}

let lastData = "";

// ✅ escape trước
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

// ✅ rồi mới tạo link
function linkify(text){
  return text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}

// ✅ FIX GIỜ CHUẨN
function formatTime(t){
  if(!t) return "";

  // nếu dạng HH:mm:ss
  if(typeof t === "string" && t.match(/^\d{2}:\d{2}:\d{2}$/)){
    return t.substring(0,5);
  }

  // nếu dạng date string
  const d = new Date(t);

  // fix timezone VN
  return d.toLocaleTimeString("vi-VN", {
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  });
}

// LOAD
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(!Array.isArray(data)) return;

    const json = JSON.stringify(data);
    if(json === lastData) return;
    lastData = json;

    const top = document.getElementById("top");
    top.innerHTML = "";

    data.forEach(item=>{
      let name = "";
      let text = item.message || "";

      const i = text.indexOf(":");
      if(i !== -1){
        name = text.substring(0,i);
        text = text.substring(i+1);
      }

      const isMe = name === username;

      const div = document.createElement("div");
      div.className = "msg " + (isMe ? "right" : "left");

      // 🔥 xử lý đúng thứ tự
      let safeText = escapeHtml(text);
      safeText = linkify(safeText);

      div.innerHTML = `
        ${!isMe ? `<div class="name">${name}</div>` : ""}
        ${safeText}
        <div class="time">${formatTime(item.time)}</div>
      `;

      top.appendChild(div);
    });

    top.scrollTop = top.scrollHeight;

  }catch(e){
    console.log(e);
  }
}

// GỬI
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message: username + ":" + text})
  });

  input.value="";
  load();
}

// ENTER
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

setInterval(load,2000);
load();
</script><!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Zalo Mini</title>

<body>

<div id="bottom">
  <input id="text" placeholder="Nhập tin..." autocomplete="off">
  <button onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx9rTPj_GAlzseem_f8SAUwzVqOOBPAdMPfc1-W4CalSY0jHIAicoLvlzICB2yEBcDY/exec";

// 🔥 lưu tên
let username = localStorage.getItem("chat_name");
if(!username){
  username = prompt("Nhập tên của bạn:");
  localStorage.setItem("chat_name", username);
}

let lastData = "";

// link clickable
function linkify(text){
  return text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}

// format giờ
function formatTime(t){
  if(!t) return "";
  if(typeof t === "string" && t.includes(":")){
    return t.substring(0,5);
  }
  const d = new Date(t);
  return d.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
}

// LOAD
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(!Array.isArray(data)) return;

    const json = JSON.stringify(data);
    if(json === lastData) return;
    lastData = json;

    const top = document.getElementById("top");
    top.innerHTML = "";

    data.forEach(item=>{
      let name = "";
      let text = item.message || "";

      // tách tên
      const i = text.indexOf(":");
      if(i !== -1){
        name = text.substring(0,i);
        text = text.substring(i+1);
      }

      const isMe = name === username;

      const div = document.createElement("div");
      div.className = "msg " + (isMe ? "right" : "left");

      div.innerHTML = `
        ${!isMe ? `<div class="name">${name}</div>` : ""}
        ${linkify(escapeHtml(text))}
        <div class="time">${formatTime(item.time)}</div>
      `;

      top.appendChild(div);
    });

    top.scrollTop = top.scrollHeight;

  }catch(e){
    console.log(e);
  }
}

// GỬI
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message: username + ":" + text})
  });

  input.value="";
  load();
}

// ENTER gửi
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

setInterval(load,2000);
load();
</script>
