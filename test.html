<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mini Pro</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:linear-gradient(to bottom,#e5ddd5,#d9e6f2);
display:flex;
flex-direction:column;
height:100vh;
}

/* CHAT */
#top{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px 14px;
margin:6px 0;
border-radius:18px;
word-wrap:break-word;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.left{
background:white;
align-self:flex-start;
}

.right{
background:linear-gradient(135deg,#0084ff,#00c6ff);
color:white;
align-self:flex-end;
}

.msg b{
font-size:12px;
opacity:0.7;
}

.time{
font-size:10px;
opacity:0.6;
text-align:right;
margin-top:4px;
}

img{
max-width:100%;
border-radius:10px;
margin-top:6px;
}

/* PREVIEW 50% */
.preview img{
max-width:50%;
border:2px dashed #ccc;
}

/* FILE */
.fileBox{
margin-top:6px;
padding:8px;
background:#f1f1f1;
border-radius:8px;
}

.right .fileBox{
background:rgba(255,255,255,0.2);
}

/* INPUT */
#bottom{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #ddd;
}

#text{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
}

button{
margin-left:6px;
padding:0 14px;
border:none;
background:#0084ff;
color:white;
border-radius:25px;
cursor:pointer;
}

#file,#file2{display:none;}
</style>
</head>

<body>

<div id="top"></div>

<div id="preview"></div>

<div id="bottom">
<input id="text" placeholder="Nhập tin...">

<input type="file" id="file" accept="image/*">
<button onclick="pickImage()">📷</button>

<input type="file" id="file2">
<button onclick="pickFile()">📎</button>

<button onclick="send()">Gửi</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwaT_cmhCopkTzrthLe3p8ReSUhdjAb-d2u8vztTd-41l0gWUvGvseatLBoewxHqlHF/exec";

let username=localStorage.getItem("name");
if(!username){
username=prompt("Tên của bạn:");
localStorage.setItem("name",username);
}

let lastData="";
let pendingFile=null;

// ===== escape =====
function escapeHtml(t){
return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ===== link =====
function makeLink(t){
return t.replace(/((https?:\/\/)?[^\s]+\.[^\s]+)/g,function(url){
let href=url.startsWith("http")?url:"https://"+url;
return '<a href="'+href+'" target="_blank">'+url+'</a>';
});
}

// ===== TIME (giữ nguyên cột D) =====
function formatTime(t){
return t || "--:--";
}

// ===== scroll =====
function isBottom(el){
return el.scrollHeight - el.scrollTop - el.clientHeight < 50;
}

// ===== LOAD =====
async function load(){

let top=document.getElementById("top");
let stay=isBottom(top);

let res=await fetch(API+"?t="+Date.now());
let data=await res.json();

let json=JSON.stringify(data);
if(json===lastData) return;
lastData=json;

top.innerHTML="";

data.forEach(row=>{

let msg=row.message||"";

let name="", text=msg;

let i=msg.indexOf(":");
if(i!=-1){
name=msg.substring(0,i);
text=msg.substring(i+1);
}

let me=name==username;

let div=document.createElement("div");
div.className="msg "+(me?"right":"left");

let content="";

// ===== IMAGE =====
if(text.startsWith("FILE|") && text.match(/\.(jpg|png|jpeg|gif)/i)){
let p=text.split("|");
content='<img src="'+p[2]+'">';

// ===== FILE =====
}else if(text.startsWith("FILE|")){
let p=text.split("|");
content=`
<div class="fileBox">
📎 ${escapeHtml(p[1])}<br>
<a href="${p[2]}" target="_blank">Tải</a>
</div>`;

// ===== TEXT =====
}else{
content=makeLink(escapeHtml(text));
}

div.innerHTML=
(me?"":"<b>"+escapeHtml(name)+"</b><br>")
+content+
'<div class="time">'+formatTime(row.time)+'</div>';

top.appendChild(div);

});

if(stay) top.scrollTop=top.scrollHeight;
}

// ===== SEND TEXT =====
async function send(){

let input=document.getElementById("text");
let text=input.value.trim();

if(pendingFile){
if(!confirm("Gửi file này?")) return;

await sendFile(pendingFile);
pendingFile=null;
document.getElementById("preview").innerHTML="";
return;
}

if(!text) return;

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message:username+":"+text
})
});

input.value="";
load();
}

// ===== PICK IMAGE =====
function pickImage(){
document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){

let file=this.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(){
pendingFile={
name:file.name,
type:file.type,
base64:reader.result.split(",")[1]
};

document.getElementById("preview").innerHTML=
'<div class="preview"><img src="'+reader.result+'"></div>';
};

reader.readAsDataURL(file);
};

// ===== PICK FILE =====
function pickFile(){
document.getElementById("file2").click();
}

document.getElementById("file2").onchange=function(){

let file=this.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(){
pendingFile={
name:file.name,
type:file.type,
base64:reader.result.split(",")[1]
};

document.getElementById("preview").innerHTML=
'<div class="preview">📎 '+escapeHtml(file.name)+'</div>';
};

reader.readAsDataURL(file);
};

// ===== SEND FILE =====
async function sendFile(f){

await fetch(API,{
method:"POST",
body:new URLSearchParams({
message:username+":BASE64|"+f.name+"|"+f.type+"|"+f.base64
})
});

load();
}

// ===== ENTER =====
document.getElementById("text").addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});

setInterval(load,1000);
load();

</script>

</body>
</html>
