<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mobile</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#f0f2f5;
}

#top{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  background:white;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  font-size:15px;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.time{
  font-size:11px;
  color:#666;
  text-align:right;
  margin-top:4px;
}

#bottom{
  display:flex;
  padding:8px;
  background:#fff;
  border-top:1px solid #ddd;
}

#text{
  flex:1;
  padding:12px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
}

#sendBtn{
  margin-left:8px;
  padding:0 16px;
  border:none;
  background:#0084ff;
  color:white;
  border-radius:25px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

a{
  color:#0068ff;
  text-decoration:underline;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
  <input id="text" placeholder="Nhập tin..." autocomplete="off">
  <button id="sendBtn" onclick="send()">Gửi</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx9rTPj_GAlzseem_f8SAUwzVqOOBPAdMPfc1-W4CalSY0jHIAicoLvlzICB2yEBcDY/exec";

let lastData = "";

// 🔥 chuyển link thành clickable
function linkify(text){
  return text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}

// 🔥 format giờ chuẩn HH:mm
function formatTime(t){
  if(!t) return "";

  // nếu dạng HH:mm:ss → lấy HH:mm
  if(typeof t === "string" && t.includes(":")){
    return t.substring(0,5);
  }

  // nếu là dạng date
  const d = new Date(t);
  return d.toLocaleTimeString("vi-VN", {
    hour:"2-digit",
    minute:"2-digit"
  });
}

// LOAD
async function load(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(!Array.isArray(data)) return;

    const json = JSON.stringify(data);
    if(json === lastData) return;
    lastData = json;

    const top = document.getElementById("top");

    top.innerHTML = data.map(item => `
      <div class="msg">
        ${linkify(escapeHtml(item.message || ""))}
        <div class="time">${formatTime(item.time)}</div>
      </div>
    `).join("");

    top.scrollTop = top.scrollHeight;

  }catch(e){
    console.log("Lỗi load:", e);
  }
}

// GỬI
async function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({message:text})
  });

  input.value="";
  load();
}

// ENTER gửi
document.getElementById("text").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

// chống lỗi HTML
function escapeHtml(text){
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

setInterval(load,2000);
load();
</script>

</body>
</html>
